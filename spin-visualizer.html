<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin &amp; Stroke Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0f0f1a;
            color: #e0e0f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 18px 20px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid #2a2a4a;
        }

        .page-header h1 {
            font-size: 20px;
            font-weight: 700;
            color: #4fc3f7;
            letter-spacing: -0.3px;
        }

        .back-link {
            color: #4fc3f7;
            text-decoration: none;
            font-size: 13px;
            opacity: 0.7;
            transition: opacity 0.15s;
        }
        .back-link:hover { opacity: 1; }

        /* ── CARD GRID ── */
        #cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }

        .shot-card {
            background: #13132a;
            border: 2px solid #2a2a4a;
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
            overflow: hidden;
            user-select: none;
        }
        .shot-card:hover { border-color: #4fc3f7; }
        .shot-card.active {
            border-color: #4fc3f7;
            box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.18);
        }
        .shot-card canvas {
            display: block;
            width: 100%;
            height: auto;
        }
        .shot-card-label {
            padding: 5px 8px 7px;
            font-size: 11px;
            font-weight: 600;
            color: #8899bb;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── DETAIL PANEL ── */
        #detail-panel {
            background: #13132a;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .detail-main {
            display: flex;
            gap: 18px;
            align-items: flex-start;
        }

        .detail-canvas-wrap {
            flex: 1;
            min-width: 0;
            border-radius: 8px;
            overflow: hidden;
            background: #0d0d20;
        }

        #detail-canvas {
            display: block;
            width: 100%;
            height: auto;
        }

        .detail-info {
            width: 210px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 4px;
        }

        .detail-title {
            font-size: 16px;
            font-weight: 700;
            color: #c8e8ff;
            line-height: 1.3;
        }

        .detail-desc {
            font-size: 12px;
            color: #6680aa;
            line-height: 1.6;
        }

        .spin-badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            background: #1a2540;
            color: #4fc3f7;
            border: 1px solid #2a4a6a;
            width: fit-content;
        }

        .detail-toggles {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 4px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            color: #7790bb;
            cursor: pointer;
        }
        .toggle-row input[type="checkbox"] {
            accent-color: #4fc3f7;
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .detail-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ctrl-btn {
            background: #1a1a3a;
            border: 1px solid #2a2a5a;
            color: #4fc3f7;
            border-radius: 7px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
            min-width: 90px;
            text-align: center;
        }
        .ctrl-btn:hover { background: #222250; }
        .ctrl-btn.active {
            background: #0d2a40;
            border-color: #4fc3f7;
            box-shadow: 0 0 0 1px rgba(79, 195, 247, 0.28);
        }

        .speed-label {
            font-size: 12px;
            color: #556;
            margin-left: 6px;
        }

        input[type="range"] {
            accent-color: #4fc3f7;
            width: 110px;
        }

        #speed-val {
            font-size: 12px;
            color: #7790bb;
            min-width: 30px;
        }
    </style>
</head>

// ── DRAWING FUNCTIONS ──────────────────────────────────────────────────────────

function drawTable(rc, W, H, view) {
    if (view === 'top') {
        const L = W * 0.07, R = W * 0.93;
        const T = H * 0.20, B = H * 0.80;
        const midX = (L + R) / 2;
        const midY = (T + B) / 2;
        // Table surface
        rc.rectangle(L, T, R - L, B - T, {
            roughness: 1.2, stroke: '#3a8a5a', strokeWidth: 2,
            fill: 'rgba(12, 48, 25, 0.9)', fillStyle: 'solid', seed: 42,
        });
        // Net line (horizontal, separates halves)
        rc.line(L, midY, R, midY, {
            roughness: 0.8, stroke: '#d4c898', strokeWidth: 3, seed: 44,
        });
        // Center line (vertical)
        rc.line(midX, T, midX, B, {
            roughness: 0.5, stroke: 'rgba(255,255,255,0.18)', strokeWidth: 1, seed: 45,
        });
        // Service lines (parallel to net, 1/4 from each end)
        const q = (R - L) * 0.25;
        rc.line(L + q, T, L + q, B, {
            roughness: 0.5, stroke: 'rgba(255,255,255,0.12)', strokeWidth: 1, seed: 46,
        });
        rc.line(R - q, T, R - q, B, {
            roughness: 0.5, stroke: 'rgba(255,255,255,0.12)', strokeWidth: 1, seed: 47,
        });
    } else {
        const tableY = H * 0.60;
        const L = W * 0.07, R = W * 0.93;
        const midX = (L + R) / 2;
        const netH = H * 0.07;
        const thick = 7;
        // Table top
        rc.line(L, tableY, R, tableY, {
            roughness: 1.1, stroke: '#3a8a5a', strokeWidth: 3, seed: 42,
        });
        // Table thickness (solid box)
        rc.rectangle(L, tableY, R - L, thick, {
            roughness: 0.8, stroke: '#2a5a30', strokeWidth: 1,
            fill: 'rgba(18, 55, 22, 0.95)', fillStyle: 'solid', seed: 53,
        });
        // Net post
        rc.line(midX, tableY - netH, midX, tableY, {
            roughness: 0.9, stroke: '#c8b870', strokeWidth: 3, seed: 7,
        });
        // Net top ball
        rc.circle(midX, tableY - netH, 6, {
            roughness: 0.5, stroke: '#c8b870', fill: '#a89840',
            fillStyle: 'solid', seed: 8,
        });
    }
}

function drawRacket(rc, cx, cy, angleDeg, scale, seed) {
    const rad = angleDeg * Math.PI / 180;
    // Racket head radii
    const rx = scale * 0.82;
    const ry = scale * 1.05;
    // Build rotated ellipse as polygon
    const steps = 18;
    const pts = [];
    for (let i = 0; i <= steps; i++) {
        const a = (i / steps) * Math.PI * 2;
        pts.push([
            cx + Math.cos(rad) * Math.cos(a) * rx - Math.sin(rad) * Math.sin(a) * ry,
            cy + Math.sin(rad) * Math.cos(a) * rx + Math.cos(rad) * Math.sin(a) * ry,
        ]);
    }
    rc.polygon(pts, {
        roughness: 1.0, stroke: '#cc4422', fill: '#7a1a08',
        fillStyle: 'hachure', hachureGap: 3.5, seed: seed,
    });
    // Handle (extends in direction perpendicular to face)
    const perp = rad + Math.PI / 2;
    const hLen = scale * 1.8;
    rc.line(
        cx + Math.cos(perp) * scale * 0.4, cy + Math.sin(perp) * scale * 0.4,
        cx + Math.cos(perp) * hLen,         cy + Math.sin(perp) * hLen,
        { roughness: 0.9, stroke: '#7a4e28', strokeWidth: 4, seed: seed + 1 }
    );
}

function drawRacketArc(rc, W, H, shot) {
    const px = shot.racket.pivotX * W;
    const py = shot.racket.pivotY * H;
    const radius = shot.racket.swingRadius * W;
    let diff = shot.racket.toAngle - shot.racket.fromAngle;
    if (diff > 180)  diff -= 360;
    if (diff < -180) diff += 360;

    const steps = 22;
    const pts = [];
    for (let i = 0; i <= steps; i++) {
        const a = (shot.racket.fromAngle + diff * (i / steps)) * Math.PI / 180;
        pts.push([px + Math.cos(a) * radius, py + Math.sin(a) * radius]);
    }
    // Dashed appearance: draw every other pair of segments
    for (let i = 0; i < pts.length - 1; i += 2) {
        rc.line(pts[i][0], pts[i][1], pts[i + 1][0], pts[i + 1][1], {
            roughness: 0.5, stroke: '#5a7fbf', strokeWidth: 1.5, seed: 17 + i,
        });
    }
    // Arrowhead at end of arc
    if (pts.length >= 2) {
        const last = pts[pts.length - 1];
        const prev = pts[pts.length - 2];
        drawArrowhead(rc, prev[0], prev[1], last[0], last[1], '#5a7fbf', 9);
    }
}

function drawTrajectory(rc, W, H, keyPoints) {
    if (keyPoints.length < 2) return;
    const pts = keyPoints.map(p => [p.x * W, p.y * H]);
    rc.curve(pts, {
        roughness: 0.7, stroke: '#4fc3f7', strokeWidth: 1.8, seed: 23,
    });
    // Bounce markers
    keyPoints.forEach((p, i) => {
        if (p.bounce) {
            rc.ellipse(p.x * W, p.y * H, 15, 7, {
                roughness: 0.6, stroke: '#ff9944', strokeWidth: 2,
                fill: 'rgba(255,153,68,0.12)', fillStyle: 'solid', seed: 60 + i,
            });
        }
    });
}

function drawBall(rc, cx, cy, r, seamRotDeg) {
    // --- body: white matte TT ball with rough sketch outline ---
    rc.circle(cx, cy, r * 2, {
        roughness: 0.28,
        stroke: '#9aaab8', strokeWidth: 0.9,
        fill: '#edf0f4', fillStyle: 'solid',
        seed: 31,
    });

    // --- equatorial seam: full rotated ellipse ---
    // As the ball spins, the major axis of the projected ellipse rotates.
    // rx = almost-ball-radius, ry = compressed depth giving a 3-D feel.
    const a = seamRotDeg * Math.PI / 180;
    const SEAM_STEPS = 26;
    const seamPts = [];
    for (let i = 0; i <= SEAM_STEPS; i++) {
        const theta = (i / SEAM_STEPS) * Math.PI * 2;
        const rx = r * 0.91, ry = r * 0.22;
        seamPts.push([
            cx + rx * Math.cos(theta) * Math.cos(a) - ry * Math.sin(theta) * Math.sin(a),
            cy + rx * Math.cos(theta) * Math.sin(a) + ry * Math.sin(theta) * Math.cos(a),
        ]);
    }
    rc.curve(seamPts, { roughness: 0.15, stroke: '#7f96aa', strokeWidth: 0.85, seed: 32 });

    // --- canvas 2D: specular highlight + logo ---
    const c2 = rc.canvas.getContext('2d');
    c2.save();

    // Clip drawing to the ball disc so nothing bleeds outside
    c2.beginPath();
    c2.arc(cx, cy, r * 0.96, 0, Math.PI * 2);
    c2.clip();

    // Specular highlight — soft white glow at upper-left (light coming from top-left)
    if (r >= 5) {
        const hx = cx - r * 0.28, hy = cy - r * 0.28;
        const hg = c2.createRadialGradient(hx, hy, 0, hx, hy, r * 0.58);
        hg.addColorStop(0, 'rgba(255,255,255,0.78)');
        hg.addColorStop(1, 'rgba(255,255,255,0)');
        c2.fillStyle = hg;
        c2.fillRect(cx - r, cy - r, r * 2, r * 2);
    }

    // Subtle shadow on the right-bottom edge for sphere depth
    if (r >= 5) {
        const sg = c2.createRadialGradient(cx + r * 0.25, cy + r * 0.25, r * 0.5,
                                           cx + r * 0.25, cy + r * 0.25, r * 1.05);
        sg.addColorStop(0, 'rgba(0,0,0,0)');
        sg.addColorStop(1, 'rgba(80,100,120,0.18)');
        c2.fillStyle = sg;
        c2.fillRect(cx - r, cy - r, r * 2, r * 2);
    }

    // Small logo — only visible on the larger detail canvas (r ≥ 11 px)
    if (r >= 11) {
        c2.font        = `bold ${Math.round(r * 0.38)}px sans-serif`;
        c2.fillStyle   = 'rgba(70,90,110,0.45)';
        c2.textAlign   = 'center';
        c2.textBaseline = 'middle';
        c2.fillText('★', cx + r * 0.28, cy + r * 0.30);
    }

    c2.restore();
}

function drawSpinIndicator(rc, cx, cy, spinType, size) {
    const color = SPIN_COLORS[spinType];
    if (!color || spinType === SPIN.NOSPIN) return;

    let startA, endA;
    // Canvas coords: y increases downward.
    // Angles: 0°=right, 90°=down, 180°=left, 270°=up.
    if (spinType === SPIN.TOPSPIN) {
        // Arc over top: left(180°) → up(270°) → right(360°/0°)
        startA = Math.PI;
        endA   = 2 * Math.PI;
    } else if (spinType === SPIN.BACKSPIN) {
        // Arc under bottom: right(0°) → down(90°) → left(180°)
        startA = 0;
        endA   = Math.PI;
    } else if (spinType === SPIN.SIDESPIN_LEFT) {
        // Left arc: bottom(90°) → left(180°) → top(270°)
        startA = Math.PI / 2;
        endA   = 3 * Math.PI / 2;
    } else { // SIDESPIN_RIGHT
        // Right arc: top(270°=-90°) → right(0°) → bottom(90°)
        startA = -Math.PI / 2;
        endA   = Math.PI / 2;
    }

    const steps = 12;
    // Use 0.62 scale on one axis for a slight ellipse (perspective feel)
    const scaleY = 0.62;
    const pts = [];
    for (let i = 0; i <= steps; i++) {
        const a = startA + (endA - startA) * (i / steps);
        pts.push([cx + Math.cos(a) * size, cy + Math.sin(a) * size * scaleY]);
    }
    for (let i = 0; i < pts.length - 1; i++) {
        rc.line(pts[i][0], pts[i][1], pts[i + 1][0], pts[i + 1][1], {
            roughness: 0.5, stroke: color, strokeWidth: 2.2, seed: 70 + i,
        });
    }
    const last = pts[pts.length - 1];
    const prev = pts[pts.length - 2];
    drawArrowhead(rc, prev[0], prev[1], last[0], last[1], color, 7);
}

// Smooth canvas-2D curve through pts[][2] — no rough.js jitter.
// Uses quadratic-bezier midpoint technique so the curve is C1-continuous.
function drawSmoothPath(ctx, pts, color, lineWidth, alpha) {
    if (pts.length < 2) return;
    ctx.save();
    if (alpha != null) ctx.globalAlpha = alpha;
    ctx.strokeStyle  = color;
    ctx.lineWidth    = lineWidth;
    ctx.lineJoin     = 'round';
    ctx.lineCap      = 'round';
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length - 1; i++) {
        const mx = (pts[i][0] + pts[i + 1][0]) / 2;
        const my = (pts[i][1] + pts[i + 1][1]) / 2;
        ctx.quadraticCurveTo(pts[i][0], pts[i][1], mx, my);
    }
    ctx.lineTo(pts[pts.length - 1][0], pts[pts.length - 1][1]);
    ctx.stroke();
    ctx.restore();
}

function drawArrowhead(rc, x1, y1, x2, y2, color, size) {
    const angle  = Math.atan2(y2 - y1, x2 - x1);
    const spread = 0.48; // ~27°
    rc.line(x2, y2, x2 - Math.cos(angle - spread) * size, y2 - Math.sin(angle - spread) * size, {
        roughness: 0.4, stroke: color, strokeWidth: 1.8, seed: 110,
    });
    rc.line(x2, y2, x2 - Math.cos(angle + spread) * size, y2 - Math.sin(angle + spread) * size, {
        roughness: 0.4, stroke: color, strokeWidth: 1.8, seed: 111,
    });
}

// ── RECEIVER'S VIEW ────────────────────────────────────────────────────────────
// Perspective geometry constants (as fractions of canvas W / H)
const RV = {
    farL:  0.33, farR:  0.67, farY:  0.36,  // far edge  (server's end)
    nearL: 0.08, nearR: 0.92, nearY: 0.82,  // near edge (receiver's end)
    tableMinX:    0.07, tableMaxX: 0.93,     // side-view table span
    tableSurfaceY: 0.60,                     // side-view table surface Y
};

// Project side-view coordinates + lateral offset to receiver-perspective screen pixels.
// sideX  : 0–1 along table (small = server's end, large = receiver's end)
// sideY  : 0–1 canvas Y in side view  (0.60 = table surface)
// lateral: -1…1 left-right shift (0 = dead centre)
function projectToReceiver(sideX, sideY, lateral, W, H) {
    const d = Math.max(0, Math.min(1,
        (sideX - RV.tableMinX) / (RV.tableMaxX - RV.tableMinX)));

    const tableScreenY = (RV.farY + (RV.nearY - RV.farY) * d) * H;
    const halfWidth    = W * ((RV.farR - RV.farL) / 2
                           + ((RV.nearR - RV.nearL) / 2 - (RV.farR - RV.farL) / 2) * d);

    const heightAbove = RV.tableSurfaceY - sideY;          // positive = above table
    const hScale      = (RV.nearY - RV.farY) * H * 2.5 * (0.15 + d * 0.85);

    return {
        x:           W / 2 + lateral * halfWidth,
        y:           tableScreenY - heightAbove * hScale,
        tableScreenY,
        ballScale:   0.25 + d * 0.75,   // size multiplier for ball + indicators
        halfWidth,
    };
}

// Horizontal shear applied to all receiver-view screen coordinates.
// Pivots at the near edge (y = nearY*H), so the near edge never shifts.
// angle: -1 (left side) … 0 (centre) … +1 (right side)
function applyAngleShear(sx, sy, angle, W, H) {
    return sx + (sy - RV.nearY * H) * angle * 0.58 * (W / H);
}

// Lateral offset in receiver's view for this shot at fractional position (sideX, sideY)
function receiverLateral(shot, sideX, sideY) {
    if (shot.view === 'top') {
        // For top-view shots the trajectory Y encodes the lateral position
        return (sideY - 0.50) * 2.0;
    }
    const d = (sideX - RV.tableMinX) / (RV.tableMaxX - RV.tableMinX);
    if (shot.spin === SPIN.SIDESPIN_LEFT)  return -d * d * 0.45;
    if (shot.spin === SPIN.SIDESPIN_RIGHT) return  d * d * 0.45;
    return 0;
}

function drawTableReceiver(rc, W, H, angle) {
    // sx(): apply horizontal shear to any (x, y) coordinate pair
    const sx = (x, y) => applyAngleShear(x, y, angle, W, H);

    const fY = RV.farY  * H, nY = RV.nearY * H;
    // Sheared table corners
    const fL = sx(RV.farL  * W, fY), fR = sx(RV.farR  * W, fY);
    const nL = sx(RV.nearL * W, nY), nR = sx(RV.nearR * W, nY);
    // Near edge never shifts (pivot is at nY), kept for clarity
    const nLraw = RV.nearL * W, nRraw = RV.nearR * W;

    // Table surface (trapezoid)
    rc.polygon([[nLraw, nY], [nRraw, nY], [fR, fY], [fL, fY]], {
        roughness: 1.1, stroke: '#3a8a5a', strokeWidth: 2,
        fill: 'rgba(10, 44, 20, 0.92)', fillStyle: 'solid', seed: 200,
    });
    // Boundary lines
    rc.line(fL, fY, nLraw, nY, { roughness: 0.6, stroke: '#3a8a5a', strokeWidth: 2, seed: 201 });
    rc.line(fR, fY, nRraw, nY, { roughness: 0.6, stroke: '#3a8a5a', strokeWidth: 2, seed: 202 });
    rc.line(fL, fY, fR, fY,    { roughness: 0.8, stroke: '#3a8a5a', strokeWidth: 2, seed: 203 });
    rc.line(nLraw, nY, nRraw, nY, { roughness: 0.8, stroke: '#3a8a5a', strokeWidth: 2, seed: 204 });
    // Centre line (converges to sheared vanishing point)
    rc.line(sx(W / 2, fY), fY, W / 2, nY, {
        roughness: 0.5, stroke: 'rgba(255,255,255,0.18)', strokeWidth: 1, seed: 205,
    });

    // Net — sits at sideX ≈ 0.50 (d ≈ 0.5 in perspective space)
    const netD      = (0.50 - RV.tableMinX) / (RV.tableMaxX - RV.tableMinX);
    const netTabY   = (RV.farY + (RV.nearY - RV.farY) * netD) * H;
    const netHW     = W * ((RV.farR - RV.farL) / 2
                        + ((RV.nearR - RV.nearL) / 2 - (RV.farR - RV.farL) / 2) * netD);
    const netHScale = (RV.nearY - RV.farY) * H * 2.5 * (0.15 + netD * 0.85);
    const netTopY   = netTabY - 0.068 * netHScale;
    const netCx     = W / 2; // centre X before shear (the "world" centre of the net)
    // Sheared net corners
    const netLL = sx(netCx - netHW, netTabY), netRR = sx(netCx + netHW, netTabY);
    const netLT = sx(netCx - netHW, netTopY), netRT = sx(netCx + netHW, netTopY);
    const netCB = sx(netCx, netTabY),          netCT = sx(netCx, netTopY);

    // Net mesh body
    rc.polygon([[netLL, netTabY], [netRR, netTabY], [netRT, netTopY], [netLT, netTopY]], {
        roughness: 0.8, stroke: '#c8b870', strokeWidth: 1,
        fill: 'rgba(180,160,80,0.12)', fillStyle: 'cross-hatch', hachureGap: 7, seed: 206,
    });
    // Net top wire
    rc.line(netLT, netTopY, netRT, netTopY, {
        roughness: 0.5, stroke: '#c8b870', strokeWidth: 2.5, seed: 207,
    });
    // Centre post
    rc.line(netCB, netTabY, netCT, netTopY, {
        roughness: 0.7, stroke: '#c8b870', strokeWidth: 2.2, seed: 208,
    });
}

function renderReceiverFrame(canvas, shot, t, showSpin, angle) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    angle = angle || 0;

    ctx.fillStyle = '#080814';
    ctx.fillRect(0, 0, W, H);

    const rc = rough.canvas(canvas);
    drawTableReceiver(rc, W, H, angle);

    // Shear based on DEPTH only (tableScreenY), not the ball's actual screen-y.
    // Using p.y (which combines depth + height) made the shear a linear function
    // of a linear function → straight line regardless of angle. Using tableScreenY
    // separates depth from height so the parabola appears in true 3D.
    const sx = (p) => applyAngleShear(p.x, p.tableScreenY, angle, W, H);

    // Full trajectory — physics-based parabolic arcs, sampled then projected
    const STEPS   = 44;
    const trajPts = [];
    for (let i = 0; i <= STEPS; i++) {
        const ti  = i / STEPS;
        const pos = shotPath(ti, shot);                         // fractions, physics arc
        const lat = receiverLateral(shot, pos.x, pos.y);
        const p   = projectToReceiver(pos.x, pos.y, lat, W, H);
        trajPts.push([sx(p), p.y]);
    }
    drawSmoothPath(ctx, trajPts, '#4fc3f7', 1.6, 0.78);

    // Bounce markers on the (sheared) table surface
    shot.trajectory.forEach((kp, i) => {
        if (!kp.bounce) return;
        const lat  = receiverLateral(shot, kp.x, kp.y);
        const p    = projectToReceiver(kp.x, kp.y, lat, W, H);
        const bx   = applyAngleShear(p.x, p.tableScreenY, angle, W, H);
        const ew   = 16 * p.ballScale, eh = 8 * p.ballScale;
        rc.ellipse(bx, p.tableScreenY, ew, eh, {
            roughness: 0.6, stroke: '#ff9944', strokeWidth: 2,
            fill: 'rgba(255,153,68,0.12)', fillStyle: 'solid', seed: 260 + i,
        });
    });

    // Animated racket — projected into receiver's perspective (server's far end)
    {
        const rr = shot.racket;
        const rm = getSwingMetrics(shot, W, H);
        const rBaseScale = Math.max(W * 0.028, 9);

        const rPosRV = (ph) => {
            let sX, sY, ang;
            if (ph >= 0) {
                sX  = rr.contactX + rm.ftNx * ph * rm.amplitude / W;
                sY  = rr.contactY + rm.ftNy * ph * rm.amplitude / H;
                ang = rr.contactAngle + ph * rm.angleDelta;
            } else {
                const wp = -ph;
                sX  = rr.contactX + rm.wuNx * wp * rm.amplitude * 0.65 / W;
                sY  = rr.contactY + rm.wuNy * wp * rm.amplitude * 0.65 / H;
                ang = rr.contactAngle - wp * rm.angleDelta;
            }
            const p = projectToReceiver(sX, sY, 0, W, H);
            // In front-on receiver view the face angle is mostly flattened
            return { x: sx(p), y: p.y, angle: ang * 0.35, scale: rBaseScale * p.ballScale };
        };

        const rGP = rPosRV(racketSwingPhase((t - 0.04 + 1) % 1));
        ctx.save();
        ctx.globalAlpha = 0.20;
        drawRacket(rc, rGP.x, rGP.y, rGP.angle, rGP.scale * 0.88, 114);
        ctx.restore();

        const rMP = rPosRV(racketSwingPhase(t));
        drawRacket(rc, rMP.x, rMP.y, rMP.angle, rMP.scale, 113);
    }

    // Animated ball — physics path (fractions), project, depth-based shear
    const curPos = shotPath(t, shot);
    const curLat = receiverLateral(shot, curPos.x, curPos.y);
    const proj   = projectToReceiver(curPos.x, curPos.y, curLat, W, H);
    const ballX  = sx(proj);
    const baseR  = Math.max(W * 0.016, 8);
    const ballR  = baseR * proj.ballScale;

    // Velocity streak — same idea as side view; also scales with perspective
    {
        const prevFp  = shotPath((t - 0.045 + 1) % 1, shot);
        const prevLat = receiverLateral(shot, prevFp.x, prevFp.y);
        const prevPrj = projectToReceiver(prevFp.x, prevFp.y, prevLat, W, H);
        const px = sx(prevPrj), py = prevPrj.y;
        const grad = ctx.createLinearGradient(px, py, ballX, proj.y);
        grad.addColorStop(0, 'rgba(240,224,48,0)');
        grad.addColorStop(1, 'rgba(240,224,48,0.50)');
        ctx.save();
        ctx.strokeStyle = grad;
        ctx.lineWidth   = ballR * 1.8;
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(ballX, proj.y);
        ctx.stroke();
        ctx.restore();
    }

    const spinDir = shot.spin === SPIN.BACKSPIN ? -1 : 1;
    drawBall(rc, ballX, proj.y, ballR, t * 360 * spinDir * 4);

    if (showSpin) {
        drawSpinIndicator(rc, ballX, proj.y, shot.spin, ballR * 2.3);
    }

    // Mode label + current angle hint
    const angleDeg = Math.round(angle * 45);
    const angleStr = angleDeg === 0 ? '0°'
        : angleDeg > 0 ? `+${angleDeg}° R` : `${angleDeg}° L`;
    ctx.save();
    ctx.font = '600 11px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(79,195,247,0.55)';
    ctx.fillText(`👁  Receiver's View  ${angleStr}`, 10, 18);
    ctx.restore();
}

// ── PHYSICS-BASED TRAJECTORY ─────────────────────────────────────────────────
// Smooth parabolic blend from p0 through pMid (at t≈0.5) to pEnd.
// x is linear in t; y adds a sin-based bulge so the arc peaks at pMid.
// All coords are fractions [0,1].
function parabolicBlend(t, p0, pMid, pEnd) {
    const x = p0.x + (pEnd.x - p0.x) * t;
    const yLinear = p0.y + (pEnd.y - p0.y) * t;
    const bulge = pMid.y - (p0.y + pEnd.y) / 2;   // negative = peak goes upward in canvas
    return { x, y: yLinear + bulge * Math.sin(Math.PI * t) };
}

// Returns ball position as {x, y} fractions at animation time t ∈ [0,1].
// Replaces the old linear posAlongPath for the animated ball.
//
// Key features:
//  • Real parabolic arc for both pre- and post-bounce segments
//  • Spin-dependent time split at bounce so the speed change is visible:
//      Topspin  → ball zips away after bounce (60 % time pre-bounce)
//      Backspin → ball creeps slowly after bounce (42 % time pre-bounce)
//  • Post-bounce arc height driven by spin physics:
//      Topspin  → moderate arc (ball drives through low)
//      Backspin → very flat arc (ball barely lifts off table, then dies)
function shotPath(t, shot) {
    const kp = shot.trajectory;
    const bounceIdx = kp.findIndex(p => p.bounce);

    if (bounceIdx < 0) {
        // No bounce — single arc through kp[1]
        const pMid = kp[1] || {
            x: (kp[0].x + kp[kp.length - 1].x) / 2,
            y: Math.min(kp[0].y, kp[kp.length - 1].y) - 0.08,
        };
        return parabolicBlend(t, kp[0], pMid, kp[kp.length - 1]);
    }

    // Time split: fraction of the loop spent BEFORE the bounce.
    // A larger split means less time for the post-bounce segment → ball appears faster.
    // Topspin (0.70): ball zips away hard after bounce — 2.3× speed jump.
    // Backspin (0.33): ball barely crawls after bounce — 0.47× speed (dies visibly).
    const bounceT = shot.spin === SPIN.TOPSPIN  ? 0.70
                  : shot.spin === SPIN.BACKSPIN ? 0.33
                  : 0.52;

    const p0   = kp[0];
    const pBnc = kp[bounceIdx];
    const pEnd = kp[kp.length - 1];

    // Pre-bounce: use existing peak keypoint as the parabola apex
    const preMid = kp[1] || {
        x: (p0.x + pBnc.x) / 2,
        y: (p0.y + pBnc.y) / 2 - 0.10,
    };

    // Post-bounce arc lift (how far above the mid-line the peak sits, canvas-y fraction)
    // Topspin: moderate arc — ball drives through fast and low after bounce
    // Backspin: tiny arc — ball barely rises; shows the dead-stop effect vividly
    const postLift = shot.spin === SPIN.TOPSPIN  ? 0.055
                   : shot.spin === SPIN.BACKSPIN ? 0.015
                   : 0.040;
    const postMid = {
        x: (pBnc.x + pEnd.x) / 2,
        y: (pBnc.y + pEnd.y) / 2 - postLift,
    };

    if (t < bounceT) {
        return parabolicBlend(t / bounceT, p0, preMid, pBnc);
    } else {
        return parabolicBlend((t - bounceT) / (1 - bounceT), pBnc, postMid, pEnd);
    }
}

// ── RACKET SWING ANIMATION ────────────────────────────────────────────────────
// Returns swing phase: 0 = contact, +1 = follow-through peak, −0.5 = wind-up.
// Uses a pair of half-sines so the function is smooth at every loop boundary.
function racketSwingPhase(t) {
    if (t < 0.28) {
        // Fast follow-through: half-sine over t=0…0.28  → phase 0→1→0
        return Math.sin((t / 0.28) * Math.PI);
    } else {
        // Slow wind-up return: half-sine over t=0.28…1  → phase 0→-0.5→0
        return -0.5 * Math.sin(((t - 0.28) / 0.72) * Math.PI);
    }
}

// ── SWING PHYSICS ─────────────────────────────────────────────────────────────
// Returns spin-realistic swing vectors for both phases of the stroke:
//   ftN*  — follow-through direction (phase > 0, after contact)
//   wuN*  — wind-up offset direction from contact (phase < 0, before contact)
// Having separate directions means backspin visibly lifts then chops DOWN while
// topspin visibly drops then brushes UP.
function getSwingMetrics(shot, W, H) {
    if (shot.spin === SPIN.TOPSPIN) {
        return {
            ftNx: 0.45,  ftNy: -0.89,   // follow-through: forward-upward brush (~63° above horiz)
            wuNx: -0.18, wuNy:  0.98,   // wind-up: racket comes from BELOW contact
            angleDelta: 20,              // face closes during follow-through
            amplitude: W * 0.095,
        };
    }
    if (shot.spin === SPIN.BACKSPIN) {
        return {
            ftNx: 0.45,  ftNy:  0.89,   // follow-through: forward-downward chop (~63° below horiz)
            wuNx: -0.10, wuNy: -0.99,   // wind-up: racket comes from ABOVE contact
            angleDelta: -18,             // face opens (scoops under) during chop
            amplitude: W * 0.095,
        };
    }
    if (shot.spin === SPIN.SIDESPIN_LEFT) {
        // Top-view: pendulum sweeps from near-net side (lower canvas-y) downward
        return {
            ftNx: 0.98,  ftNy:  0.20,   // mostly forward after contact
            wuNx: -0.10, wuNy: -0.995,  // wind-up: racket is toward-net side (smaller canvas-y)
            angleDelta: -12,
            amplitude: W * 0.090,
        };
    }
    if (shot.spin === SPIN.SIDESPIN_RIGHT) {
        return {
            ftNx: 0.98,  ftNy: -0.20,
            wuNx: -0.10, wuNy:  0.995,
            angleDelta: 12,
            amplitude: W * 0.090,
        };
    }
    // No spin — gentle push along ball heading
    const traj = shot.trajectory;
    const nextPt = traj[1] || traj[0];
    const bDx = nextPt.x * W - shot.racket.contactX * W;
    const bDy = nextPt.y * H - shot.racket.contactY * H;
    const bLen = Math.sqrt(bDx * bDx + bDy * bDy) || 1;
    return {
        ftNx:  bDx / bLen, ftNy:  bDy / bLen,
        wuNx: -bDx / bLen, wuNy: -bDy / bLen,
        angleDelta: 0,
        amplitude: W * 0.058,
    };
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderFrame(canvas, shot, t, showSpin, showArc) {
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    ctx.fillStyle = '#0d0d20';
    ctx.fillRect(0, 0, W, H);

    const rc = rough.canvas(canvas);

    drawTable(rc, W, H, shot.view);
    if (showArc) drawRacketArc(rc, W, H, shot);

    // Draw physics-based trajectory (parabolic arcs, matches animated ball)
    {
        const trajPts = [];
        for (let i = 0; i <= 44; i++) {
            const fp = shotPath(i / 44, shot);
            trajPts.push([fp.x * W, fp.y * H]);
        }
        // Canvas-2D smooth path — no rough.js jitter on the trajectory line
        drawSmoothPath(ctx, trajPts, '#4fc3f7', 1.8, 0.82);
        // Bounce marker(s)
        shot.trajectory.forEach((p, idx) => {
            if (!p.bounce) return;
            rc.ellipse(p.x * W, p.y * H, 15, 7, {
                roughness: 0.6, stroke: '#ff9944', strokeWidth: 2,
                fill: 'rgba(255,153,68,0.12)', fillStyle: 'solid', seed: 60 + idx,
            });
        });
    }

    // Animated racket — sweeps through contact → follow-through → wind-up each loop
    const racketScale = Math.max(W * 0.028, 9);
    const r = shot.racket;

    // Spin-realistic swing: separate follow-through and wind-up directions
    const { ftNx, ftNy, wuNx, wuNy, angleDelta, amplitude } = getSwingMetrics(shot, W, H);

    // Compute racket centre + face angle for any swing phase value.
    // phase > 0 → follow-through (e.g. upward for topspin, downward for backspin)
    // phase < 0 → wind-up (racket comes from the opposite side of contact)
    const racketAt = (ph) => {
        if (ph >= 0) {
            return {
                x: r.contactX * W + ftNx * ph * amplitude,
                y: r.contactY * H + ftNy * ph * amplitude,
                angle: r.contactAngle + ph * angleDelta,
            };
        }
        const wp = -ph; // positive wind-up magnitude (0 … 0.5)
        return {
            x: r.contactX * W + wuNx * wp * amplitude * 0.65,
            y: r.contactY * H + wuNy * wp * amplitude * 0.65,
            angle: r.contactAngle - wp * angleDelta,
        };
    };

    // Ghost racket (4 % of cycle behind) — motion trail
    const gp = racketAt(racketSwingPhase((t - 0.04 + 1) % 1));
    ctx.save();
    ctx.globalAlpha = 0.20;
    drawRacket(rc, gp.x, gp.y, gp.angle, racketScale * 0.88, 14);
    ctx.restore();

    // Main racket
    const mp = racketAt(racketSwingPhase(t));
    drawRacket(rc, mp.x, mp.y, mp.angle, racketScale, 11);

    // Animated ball (physics path, fractions → pixels)
    const fpos  = shotPath(t, shot);
    const pos   = { x: fpos.x * W, y: fpos.y * H };
    const ballR = Math.max(W * 0.016, 8);

    // Velocity streak: distance between current and past-0.045 position encodes speed.
    // After a topspin bounce the streak is long; after a backspin bounce it is short.
    {
        const prevFp = shotPath((t - 0.045 + 1) % 1, shot);
        const px = prevFp.x * W, py = prevFp.y * H;
        const grad = ctx.createLinearGradient(px, py, pos.x, pos.y);
        grad.addColorStop(0, 'rgba(240,224,48,0)');
        grad.addColorStop(1, 'rgba(240,224,48,0.50)');
        ctx.save();
        ctx.strokeStyle = grad;
        ctx.lineWidth   = ballR * 1.8;
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.restore();
    }

    const spinDir = shot.spin === SPIN.BACKSPIN ? -1 : 1;
    drawBall(rc, pos.x, pos.y, ballR, t * 360 * spinDir * 4);

    if (showSpin) {
        drawSpinIndicator(rc, pos.x, pos.y, shot.spin, ballR * 2.3);
    }
}

// ── ANIMATION ─────────────────────────────────────────────────────────────────
const animations = new Map();

function startAnimation(canvas, shot, getState) {
    const key = canvas.dataset.animKey || canvas.id || shot.key;
    const existing = animations.get(key);
    if (existing) {
        existing.active = false;
        cancelAnimationFrame(existing.raf);
    }

    let t = 0;
    let lastTs = null;
    const entry = { active: true, raf: 0 };
    animations.set(key, entry);

    function frame(ts) {
        if (!entry.active) return;
        if (!lastTs) lastTs = ts;
        const dt = Math.min((ts - lastTs) / 1000, 0.1);
        lastTs = ts;

        const st = getState();
        if (st.playing) {
            t = (t + dt * 0.38 * st.speed) % 1;
        }
        if (st.receiverView) {
            renderReceiverFrame(canvas, shot, t, st.showSpin, st.viewAngle || 0);
        } else {
            renderFrame(canvas, shot, t, st.showSpin, st.showArc);
        }
        entry.raf = requestAnimationFrame(frame);
    }

    entry.raf = requestAnimationFrame(frame);
}

// ── CARDS ─────────────────────────────────────────────────────────────────────
function createCard(shot) {
    const card = document.createElement('div');
    card.className = 'shot-card';
    card.dataset.key = shot.key;

    const canvas = document.createElement('canvas');
    canvas.width  = 240;
    canvas.height = 136;
    canvas.dataset.animKey = 'card-' + shot.key;

    const label = document.createElement('div');
    label.className = 'shot-card-label';
    label.textContent = shot.name;

    card.appendChild(canvas);
    card.appendChild(label);
    card.addEventListener('click', () => selectShot(shot.key));

    // Cards always play at half speed, no arc, with spin
    startAnimation(canvas, shot, () => ({
        playing: true, speed: 0.5, showSpin: true, showArc: false,
    }));

    return card;
}

// ── DETAIL PANEL ──────────────────────────────────────────────────────────────
const detailCanvas = document.getElementById('detail-canvas');
const detailState  = { playing: true, speed: 1, showSpin: true, showArc: true, receiverView: false, viewAngle: 0 };

function selectShot(key) {
    const shot = SHOTS.find(s => s.key === key);
    if (!shot) return;

    // Highlight active card
    document.querySelectorAll('.shot-card').forEach(c => {
        c.classList.toggle('active', c.dataset.key === key);
    });

    // Update info panel
    document.getElementById('detail-title').textContent = shot.name;
    document.getElementById('detail-desc').textContent  = shot.description;
    document.getElementById('detail-spin').textContent  = SPIN_LABELS[shot.spin] || shot.spin;

    // Restart detail animation for new shot
    startAnimation(detailCanvas, shot, () => ({ ...detailState }));
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────
const btnPlay     = document.getElementById('btn-play');
const speedSlider = document.getElementById('speed-slider');
const speedVal    = document.getElementById('speed-val');

btnPlay.addEventListener('click', () => {
    detailState.playing = !detailState.playing;
    btnPlay.textContent = detailState.playing ? '⏸ Pause' : '▶ Play';
});

speedSlider.addEventListener('input', () => {
    detailState.speed = parseFloat(speedSlider.value);
    speedVal.textContent = detailState.speed.toFixed(1) + '×';
});

document.getElementById('toggle-spin').addEventListener('change', e => {
    detailState.showSpin = e.target.checked;
});

document.getElementById('toggle-arc').addEventListener('change', e => {
    detailState.showArc = e.target.checked;
});

const btnReceiver  = document.getElementById('btn-receiver');
const angleWrap    = document.getElementById('angle-wrap');
const angleSlider  = document.getElementById('angle-slider');
const angleVal     = document.getElementById('angle-val');

btnReceiver.addEventListener('click', () => {
    detailState.receiverView = !detailState.receiverView;
    btnReceiver.classList.toggle('active', detailState.receiverView);
    angleWrap.style.display = detailState.receiverView ? 'flex' : 'none';
});

angleSlider.addEventListener('input', () => {
    detailState.viewAngle = parseFloat(angleSlider.value);
    const deg = Math.round(detailState.viewAngle * 45);
    angleVal.textContent = deg === 0 ? '0°' : deg > 0 ? `+${deg}°` : `${deg}°`;
});

// ── INIT ──────────────────────────────────────────────────────────────────────
const grid = document.getElementById('cards-grid');
SHOTS.forEach(shot => grid.appendChild(createCard(shot)));

// Select first shot by default
selectShot(SHOTS[0].key);
</script>
</body>
